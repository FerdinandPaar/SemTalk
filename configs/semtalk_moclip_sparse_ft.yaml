is_train: True
ddp: True
gpus: [0,1,2,3]
stat: wandb 
pre_frames: 4
root_path: ./
out_path: ./outputs/
project: semtalk_svib_phys_ft
data_path: ./BEAT2/beat_english_v2.0.0/
e_path:  weights/AESKConv_240_100.bin
eval_model: motion_representation
e_name: VAESKConv
data_path_1: ./BEAT2/pretrained/
vae_test_len: 32
vae_test_dim: 330
vae_test_stride: 20
vae_length: 240
vae_codebook_size: 256
vae_layer: 4
vae_grow: [1,1,2,1]
variational: False

# ── Fine-tuning: resume from best S-VIB + physics checkpoint ──
# start_epoch tells the training loop to begin at epoch 116 so all warmup
# schedules (VIB β, phys β) report correct values from the start of fine-tuning.
load_ckpt: ./outputs/custom/0305_073649_semtalk_moclip_sparse/best_116.bin
base_ckpt: ./weights/best_semtalk_base.bin
start_epoch: 116
epochs: 220

# Flow-Matching toggle
use_flow_matching: false

# -------- TMR / MoCLIP-specific --------
semantic_encoder: tmr
moclip_ckpt: ./weights/moclip_checkpoints/models/tmr_humanml3d_guoh3dfeats/last_weights/text_encoder.pt
distilbert_path: distilbert-base-uncased
clip_dim: 256

# data config — same cache as training run
training_speakers: [2] 
additional_data: False
cache_path: datasets/beat2_cache_2
dataset: semtalk_dataloader
train_path: datasets/beat2_semtalk_train_moclip
test_path: datasets/beat2_semtalk_test_moclip.pkl
new_cache: False

# motion config
ori_joints: beat_smplx_joints
tar_joints: beat_smplx_full
pose_rep: smplxflame_30
pose_norm: False
pose_fps: 30
rot6d: True
pre_frames: 4
pose_dims: 330
pose_length: 64
stride: 20
test_length: 64
motion_f: 256
m_pre_encoder: null
m_encoder: null
m_fix_pre: False

# audio config
audio_rep: onset+amplitude
audio_sr: 16000
audio_fps: 16000
audio_norm: False
audio_f: 256

# text config
word_rep: textgrid
word_index_num: 11195
word_dims: 300
freeze_wordembed: False
word_f: 256
t_pre_encoder: fasttext
t_encoder: null
t_fix_pre: False

# facial config
facial_rep: smplxflame_30
facial_dims: 100
facial_norm: False
facial_f: 0
f_pre_encoder: null
f_encoder: null
f_fix_pre: False

# speaker config
id_rep: onehot
speaker_f: 0

# model config
batch_size: 64
lr_base: 5e-5      # half the original lr for fine-tuning
model: semtalk
g_name: semtalk_svib_phys
trainer: semtalk_sparse
hidden_size: 768
n_layer: 1

# ── S-VIB (P3): stronger β forces harder gate commitment ──
# β=0.010: now same order of magnitude as cross-entropy gate loss (0.3–0.8 nats)
# free_bits=0.20: tighter floor so KL contributes sooner
# warmup_end=120: slower ramp at higher β to avoid gate collapse around epoch 116
vib_enabled: true
vib_z_dim: 16
vib_timing_dim: 64
vib_beta_target: 0.010
vib_warmup_start: 20
vib_warmup_end: 120
vib_free_bits: 0.20

# ── Physics Smoother (P1 + P2): sqrt τ + pose-level jerk loss ──
# phys_tau_base=0.50, phys_tau_floor=0.10: from P1 (already in base config)
# phys_lambda=0.08: increased because decoded-pose jerk values are smaller
# in absolute scale than latent jerk values (P2 calibration)
phys_enabled: true
phys_tau_base: 0.50
phys_tau_floor: 0.10
phys_alpha: 1.0
phys_lambda: 0.08
phys_warmup_start: 30
phys_warmup_end: 80

rec_weight: 1
grad_norm: 0.99
test_period: 5
log_period: 10
decay_epochs: 999

ll: 3
lf: 3
lu: 3
lh: 3
cl: 1
cf: 1
cu: 1
ch: 1
