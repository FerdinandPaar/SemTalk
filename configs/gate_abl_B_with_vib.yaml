## gate_abl_B: WITH VIB — S-VIB gate (Apr 12, 2026)
## PURPOSE: Clean gate ablation. Identical to gate_abl_A except vib_enabled=true.
## This isolates whether the S-VIB gate improves FGD over a simple linear gate.
## Both runs: same checkpoint, same trainer, same epochs, no physics, no gate_smooth.
is_train: True
ddp: True
gpus: [0,1,2,3]
stat: ts
pre_frames: 4
root_path: ./
out_path: ./outputs/
project: semtalk_gate_ablation
data_path: ./BEAT2/beat_english_v2.0.0/
e_path: weights/AESKConv_240_100.bin
eval_model: motion_representation
e_name: VAESKConv
data_path_1: ./BEAT2/pretrained/
vae_test_len: 32
vae_test_dim: 330
vae_test_stride: 20
vae_length: 240
vae_codebook_size: 256
vae_layer: 4
vae_grow: [1,1,2,1]
variational: False

load_ckpt: ./outputs/custom/0311_102115_s01_base_r05_r05base_s01_base_r05_b0.010_fb0.30_pl0.08_tb0.50_tf0.10/best_184.bin
base_ckpt: ./weights/best_semtalk_base.bin

use_flow_matching: false

semantic_encoder: tmr
moclip_ckpt: ./weights/moclip_checkpoints/models/tmr_humanml3d_guoh3dfeats/last_weights/text_encoder.pt
distilbert_path: distilbert-base-uncased
clip_dim: 256

training_speakers: [2]
additional_data: False
cache_path: datasets/beat2_cache_2
dataset: semtalk_dataloader
train_path: datasets/beat2_semtalk_train_moclip
test_path: datasets/beat2_semtalk_test_moclip.pkl
new_cache: False

ori_joints: beat_smplx_joints
tar_joints: beat_smplx_full
pose_rep: smplxflame_30
pose_norm: False
pose_fps: 30
rot6d: True
pre_frames: 4
pose_dims: 330
pose_length: 64
stride: 20
test_length: 64
motion_f: 256
m_pre_encoder: null
m_encoder: null
m_fix_pre: False

audio_rep: onset+amplitude
audio_sr: 16000
audio_fps: 16000
audio_norm: False
audio_f: 256

word_rep: textgrid
word_index_num: 11195
word_dims: 300
freeze_wordembed: False
word_f: 256
t_pre_encoder: fasttext
t_encoder: null
t_fix_pre: False

facial_rep: smplxflame_30
facial_dims: 100
facial_norm: False
facial_f: 0
f_pre_encoder: null
f_encoder: null
f_fix_pre: False

id_rep: onehot
speaker_f: 0

batch_size: 64
lr_base: 1e-4
epochs: 264
decay_epochs: 999
model: semtalk
g_name: semtalk_svib_phys
trainer: semtalk_sparse
hidden_size: 768
n_layer: 1

## ─── THE ONLY DIFFERENCE: VIB ON ───
latent_loss_mode: pred_gate
sem_boost: 3.0
vib_enabled: true
vib_z_dim: 16
vib_timing_dim: 64
vib_beta_target: 0.050
vib_warmup_start: 0
vib_warmup_end: 20
vib_free_bits: 0.30

## ─── Everything below is IDENTICAL to gate_abl_A ───
contrast_enabled: false
phys_enabled: false
gate_smooth_weight: 0.0
gate_mean_weight: 0.0

latent_bridge_enabled: true
latent_bridge_alpha: 0.45

mass_cond_mode: none
mass_cond_scale: 0.30
base_mass_cond_mode: none
base_mass_cond_scale: 0.30

joint_train_base_in_sparse: false

dual_stage_cond_enabled: true
early_cond_scale: 0.20
mid_cond_scale: 0.15

rec_weight: 1
grad_norm: 0.99
