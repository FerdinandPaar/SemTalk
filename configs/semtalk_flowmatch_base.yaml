is_train: True
ddp: False
gpus: [0]
stat: ts 
pre_frames: 4
root_path: ./
out_path: ./outputs/
project: semtalk_flowmatch_base
data_path: ./BEAT2/beat_english_v2.0.0/
e_path:  weights/AESKConv_240_100.bin
eval_model: motion_representation
e_name: VAESKConv
data_path_1: ./weights/
vae_test_len: 32
vae_test_dim: 330
vae_test_stride: 20
vae_length: 240
vae_codebook_size: 256
vae_layer: 4
vae_grow: [1,1,2,1]
variational: False

# ckpt
load_ckpt: None

# data config
training_speakers: [2] 
additional_data: False
cache_path: datasets/beat2_cache_2
dataset: semtalk_dataloader
train_path: datasets/beat2_semtalk_train
test_path: datasets/beat2_semtalk_test.pkl
new_cache: False

# motion config
ori_joints: beat_smplx_joints
tar_joints: beat_smplx_full
pose_rep: smplxflame_30
pose_norm: False
pose_fps: 30
rot6d: True
pre_frames: 4
pose_dims: 330
pose_length: 64
stride: 20
test_length: 64
motion_f: 256
m_pre_encoder: null
m_encoder: null
m_fix_pre: False

# audio config
audio_rep: onset+amplitude
audio_sr: 16000
audio_fps: 16000
audio_norm: False
audio_f: 256

# text config
word_rep: textgrid
word_index_num: 11195
word_dims: 300
freeze_wordembed: False
word_f: 256
t_pre_encoder: fasttext
t_encoder: null
t_fix_pre: False

# facial config
facial_rep: smplxflame_30
facial_dims: 100
facial_norm: False
facial_f: 0
f_pre_encoder: null
f_encoder: null
f_fix_pre: False

# speaker config
id_rep: onehot
speaker_f: 0

# model config
batch_size: 64
lr_base: 1e-4
# IMPORTANT: model points to the new flow_matching_base module
model: flow_matching_base
g_name: GestureLSMBaseMotion
trainer: flowmatch_base
hidden_size: 768
n_layer: 1

# ---------- Flow Matching hyper-parameters ----------
fm_num_layers: 6          # Spatial-Temporal transformer depth
fm_num_heads: 8           # attention heads
fm_dropout: 0.1
fm_sigma_min: 0.0001      # minimal noise in OT path
fm_beta_alpha: 2.0         # Beta distribution α for timestep sampling
fm_beta_beta: 1.2          # Beta distribution β for timestep sampling
fm_num_inference_steps: 50 # Euler integration steps at test time
fm_cfg_drop_prob: 0.1      # classifier-free guidance dropout
fm_loss_weight: 1.0        # weight for Flow Matching loss

# ---------- Loss weights ----------
rec_weight: 1
grad_norm: 0.99
epochs: 200
test_period: 5
log_period: 10
decay_epochs: 999

ll: 3
lf: 3
lu: 3
lh: 3
cl: 1
cf: 1
cu: 1
ch: 1
